name: tiflux-glpi-migrator

services:
  # ---------------------------------------------------------------------------
  # MySQL 8 — banco do GLPI
  # ---------------------------------------------------------------------------
  db:
    image: "mysql:8.0"
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/mysql
    environment:
      MYSQL_RANDOM_ROOT_PASSWORD: "yes"
      MYSQL_DATABASE: ${GLPI_DB_NAME:-glpi}
      MYSQL_USER: ${GLPI_DB_USER:-glpi}
      MYSQL_PASSWORD: ${GLPI_DB_PASSWORD:?Defina GLPI_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u${GLPI_DB_USER:-glpi} -p${GLPI_DB_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  # ---------------------------------------------------------------------------
  # GLPI — helpdesk (exposto via Coolify reverse-proxy)
  # ---------------------------------------------------------------------------
  glpi:
    image: "glpi/glpi:latest"
    restart: unless-stopped
    volumes:
      - glpi_data:/var/glpi
    environment:
      GLPI_DB_HOST: db
      GLPI_DB_NAME: ${GLPI_DB_NAME:-glpi}
      GLPI_DB_USER: ${GLPI_DB_USER:-glpi}
      GLPI_DB_PASSWORD: ${GLPI_DB_PASSWORD:?Defina GLPI_DB_PASSWORD}
    depends_on:
      db:
        condition: service_started
    # Coolify cuida do proxy; para dev local descomente a linha abaixo:
    # ports:
    #   - "8080:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  # ---------------------------------------------------------------------------
  # glpi-init — configura API na primeira vez (roda e sai)
  # ---------------------------------------------------------------------------
  glpi-init:
    image: "mysql:8.0"
    depends_on:
      glpi:
        condition: service_started
    restart: "no"
    environment:
      GLPI_DB_HOST: db
      GLPI_DB_NAME: ${GLPI_DB_NAME:-glpi}
      GLPI_DB_USER: ${GLPI_DB_USER:-glpi}
      GLPI_DB_PASSWORD: ${GLPI_DB_PASSWORD:?Defina GLPI_DB_PASSWORD}
    entrypoint: ["bash", "-c", "set -euo pipefail; echo '[glpi-init] Aguardando MySQL...'; until mysqladmin ping -h\"$$GLPI_DB_HOST\" -u\"$$GLPI_DB_USER\" -p\"$$GLPI_DB_PASSWORD\" --silent 2>/dev/null; do sleep 2; done; echo '[glpi-init] MySQL pronto.'; echo '[glpi-init] Aguardando GLPI schema...'; until mysql -h\"$$GLPI_DB_HOST\" -u\"$$GLPI_DB_USER\" -p\"$$GLPI_DB_PASSWORD\" \"$$GLPI_DB_NAME\" -e 'SELECT 1 FROM glpi_configs LIMIT 1' &>/dev/null; do sleep 3; done; echo '[glpi-init] GLPI schema detectado.'; echo '[glpi-init] Habilitando API REST...'; mysql -h\"$$GLPI_DB_HOST\" -u\"$$GLPI_DB_USER\" -p\"$$GLPI_DB_PASSWORD\" \"$$GLPI_DB_NAME\" -e \"UPDATE glpi_configs SET value=1 WHERE name='enable_api'; UPDATE glpi_configs SET value=1 WHERE name='enable_api_login_credentials'; UPDATE glpi_configs SET value=1 WHERE name='enable_api_login_external_token'; UPDATE glpi_apiclients SET ipv4_range_start=0, ipv4_range_end=4294967295, is_active=1 WHERE id=1;\"; echo '[glpi-init] API configurada com sucesso.'"]

  # ---------------------------------------------------------------------------
  # Migrator — ETL Tiflux → GLPI (roda sob demanda)
  # ---------------------------------------------------------------------------
  migrator:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      glpi:
        condition: service_started
    volumes:
      - migrator_data:/app/data
    entrypoint: ["sleep", "infinity"]
    command: []
    environment:
      TIFLUX_BASE_URL: ${TIFLUX_BASE_URL:-https://api.tiflux.com}
      TIFLUX_API_TOKEN: ${TIFLUX_API_TOKEN:?Defina TIFLUX_API_TOKEN}
      GLPI_BASE_URL: http://glpi:80
      GLPI_USER: ${GLPI_USER:-glpi}
      GLPI_PASS: ${GLPI_PASS:-glpi}
      GLPI_DB_HOST: db
      GLPI_DB_PORT: "3306"
      GLPI_DB_NAME: ${GLPI_DB_NAME:-glpi}
      GLPI_DB_USER: ${GLPI_DB_USER:-glpi}
      GLPI_DB_PASSWORD: ${GLPI_DB_PASSWORD:?Defina GLPI_DB_PASSWORD}
      MIGRATOR_DATA_DIR: /app/data

volumes:
  glpi_data:
  db_data:
  migrator_data:

